  <title>NADIBARITO | The Digital Pulse of Thousand Rivers</title>
  <script>
    // Perombakan Brand: Force Dark Mode for Premium Aesthetic
    document.documentElement.classList.add('dark');
    localStorage.setItem('theme', 'dark');

    // Truly remove Spline watermark via MutationObserver
    const removeSplineWatermark = () => {
      const selectors = [
        '#spline-watermark',
        '.spline-watermark',
        'a[href*="spline.design"]',
        '[class*="spline_watermark"]'
      ];
      
      selectors.forEach(selector => {
        document.querySelectorAll(selector).forEach(el => el.remove());
      });

      // Pierce shadow DOM for spline-viewer if present
      document.querySelectorAll('spline-viewer').forEach(viewer => {
        if (viewer.shadowRoot) {
          const watermark = viewer.shadowRoot.querySelector('#watermark') || 
                           viewer.shadowRoot.querySelector('.spline-watermark');
          if (watermark) watermark.remove();
        }
      });
    };

    const observer = new MutationObserver(removeSplineWatermark);
    observer.observe(document.body, { childList: true, subtree: true });
    window.addEventListener('load', removeSplineWatermark);
  </script>
